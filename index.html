<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HTML 已严肃收集 ✨</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff7fb;
      padding: 28px 20px 60px;
      color: #333;
      max-width: 940px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    h1 { color: #ff6fa5; font-size: 1.7rem; }

    /* ── Input box ──────────────────────── */
    .input-box {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      margin-bottom: 22px;
    }
    .form-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #bbb;
      margin-bottom: 5px;
      margin-top: 10px;
    }
    .form-label:first-child { margin-top: 0; }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1.5px solid #eee;
      outline: none;
      font-size: 14px;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #ffb3d0; }

    textarea.code-input {
      width: 100%;
      height: 110px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1.5px solid #eee;
      outline: none;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      resize: vertical;
      transition: border-color .2s;
    }
    textarea.code-input:focus { border-color: #ffb3d0; }

    /* ── Buttons ────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 15px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, transform .1s, opacity .15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }

    .btn-pink   { background: #ff8fab; color: #fff; }
    .btn-pink:hover  { background: #ff6fa5; }

    .btn-blue   { background: #a8d8ea; color: #1a4a5e; }
    .btn-blue:hover  { background: #76c1d7; }

    .btn-gray   { background: #e5e5e5; color: #555; }
    .btn-gray:hover  { background: #ccc; }

    .btn-green  { background: #a8e6cf; color: #1a5e3a; }
    .btn-green:hover { background: #6cd4a8; }

    .btn-red    { background: #ffc0c0; color: #7a2020; }
    .btn-red:hover   { background: #ff9090; }

    .btn-purple { background: #d0bfff; color: #3d1a6e; }
    .btn-purple:hover { background: #b39dda; }

    .btn-sm { padding: 5px 11px; font-size: 12px; }

    /* ── Item cards ─────────────────────── */
    .item {
      background: #fff;
      border-radius: 16px;
      margin-top: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .item:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.10); }

    .item-header {
      padding: 14px 18px;
      cursor: pointer;
      font-weight: bold;
      color: #ff6fa5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: background .15s;
    }
    .item-header:hover { background: #fff0f7; }

    .item-title-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 10px;
    }

    .chevron {
      transition: transform .22s;
      color: #ffb3d0;
      font-size: 11px;
      flex-shrink: 0;
    }
    .chevron.is-open { transform: rotate(180deg); }

    .item-body { border-top: 1px solid #ffeef7; }

    .item-toolbar {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      background: #fffbfd;
      border-bottom: 1px solid #ffeef7;
      flex-wrap: wrap;
    }
    .toolbar-spacer { flex: 1; min-width: 8px; }

    /* ── Code editor ────────────────────── */
    .code-editor {
      width: 100%;
      min-height: 220px;
      max-height: 70vh;
      padding: 16px;
      border: none;
      outline: none;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.65;
      background: #1e1e2e;
      color: #cdd6f4;
      resize: vertical;
      display: block;
      tab-size: 2;
    }

    /* ── Preview iframe ─────────────────── */
    .preview-frame {
      width: 100%;
      border: none;
      display: block;
      min-height: 60px;
    }

    /* ── Misc ───────────────────────────── */
    .empty {
      text-align: center;
      color: #ddd;
      margin-top: 60px;
      font-size: 16px;
    }
    .add-row { margin-top: 14px; }

    .save-tip {
      font-size: 11.5px;
      color: #c9a6d8;
      margin-left: 6px;
    }
  </style>
</head>

/* ── Unicode-safe Base64 helpers ──────────────────────────────────────────── */
function encodeB64(str) {
  const bytes = new TextEncoder().encode(str)
  let bin = ''
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i])
  return btoa(bin)
}
function decodeB64(b64) {
  const bin = atob(b64)
  const bytes = new Uint8Array(bin.length)
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i)
  return new TextDecoder().decode(bytes)
}

let _uid = 0
function makeItem(raw) {
  return {
    _id:       ++_uid,
    title:     raw.title    || '',
    content:   raw.content  || '',
    open:      false,
    editing:   false,
    editDraft: ''
  }
}

/* ── Vue App ──────────────────────────────────────────────────────────────── */
createApp({
  template: APP_TEMPLATE,

  data() {
    /* Priority: localStorage > embedded file data */
    let raw = []
    try {
      const ls = localStorage.getItem('html_items')
      if (ls) raw = JSON.parse(ls)
    } catch(e) {}
    if (!raw.length) raw = loadEmbedded()

    return {
      newTitle:  '',
      newContent:'',
      items:     raw.map(makeItem),
      dirty:     false
    }
  },

  methods: {
    add() {
      if (!this.newContent.trim()) return
      this.items.unshift(makeItem({
        title:   this.newTitle.trim() || '（无标题）',
        content: this.newContent
      }))
      this.newTitle   = ''
      this.newContent = ''
      this._persist()
    },

    toggle(item) {
      item.open = !item.open
      if (!item.open) item.editing = false
    },

    startEdit(item) {
      item.editDraft = item.content
      item.editing   = true
    },

    saveEdit(item) {
      item.content = item.editDraft
      item.editing = false
      this._persist()
    },

    cancelEdit(item) {
      item.editing = false
    },

    remove(idx) {
      if (confirm('确定删除这个条目？')) {
        this.items.splice(idx, 1)
        this._persist()
      }
    },

    _persist() {
      const clean = this.items.map(i => ({ title: i.title, content: i.content }))
      localStorage.setItem('html_items', JSON.stringify(clean))
      this.dirty = true
    },

    resizeIframe(e) {
      const f = e.target
      try {
        const h = f.contentWindow.document.documentElement.scrollHeight
        f.style.height = Math.max(h, 60) + 'px'
      } catch(_) {
        f.style.height = '400px'
      }
    },

    saveToFile() {
      const clean = this.items.map(i => ({ title: i.title, content: i.content }))
      const b64   = encodeB64(JSON.stringify(clean))

      /* Rebuild the file: grab outerHTML (script tags preserved) and patch _D */
      let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML
      html = html.replace(
        /const _D = \{"b":"[^"]*"\}/,
        'const _D = {"b":"' + b64 + '"}'
      )

      const blob = new Blob([html], { type: 'text/html;charset=utf-8' })
      const a    = document.createElement('a')
      a.href     = URL.createObjectURL(blob)
      a.download = 'HTML_收藏夹__.html'
      document.body.appendChild(a)
      a.click()
      document.body.removeChild(a)
      setTimeout(() => URL.revokeObjectURL(a.href), 2000)

      this.dirty = false
    }
  }
}).mount('#app')
</script>
